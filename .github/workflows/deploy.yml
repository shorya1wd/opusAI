name: Auto Deploy to DigitalOcean

# 1. This tells GitHub to run this script ONLY when you push to 'main'
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 2. This is a pre-built action that securely handles the SSH connection
      - name: Connect and Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # We use GitHub Secrets so your IP and passwords aren't public
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          script: |
            # 3. Navigate to your project folder 
            # ⚠️ IMPORTANT: Change '~/opus-ai' to wherever your project actually lives on the server!
            cd /root/opusAI
            
            # 4. Pull the latest code from GitHub
            git pull origin main
            
            # 5. Rebuild and restart the Docker containers without downtime
            docker compose up -d --build
            
            # 6. Housekeeping: Delete old Docker images so your Droplet doesn't run out of storage over time
            docker image prune -f